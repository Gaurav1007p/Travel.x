name: Deploy Vite app to GitHub Pages

on:
  workflow_dispatch:
    # Disabled automatic deploys (push trigger removed).


permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: TravelX/package-lock.json

      - name: Install
        run: npm ci
        working-directory: TravelX

      - name: Build
        run: npm run build
        working-directory: TravelX

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: TravelX/dist
          publish_branch: gh-pages
          force_orphan: true

